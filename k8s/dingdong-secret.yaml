# Example: pull the bearer token from 1Password via the onepassword-operator.
# Replace this with whatever secret source fits your cluster — sealed-secrets,
# external-secrets, plain `kubectl create secret`, etc. — as long as the result
# is a Secret named `dingdong-token` in the `dingdong` namespace with a `token`
# key. That value is what every agent passes as DINGDONG_TOKEN.
#
# Generate the token with: openssl rand -hex 32
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: dingdong-token
  namespace: dingdong
spec:
  itemPath: vaults/REPLACE_ME_VAULT/items/REPLACE_ME_ITEM
