# Pulled from 1Password by the onepassword-operator (see manifests/onepassword
# in homelab-ci). The vault item must contain a `token` field; that value is
# what every agent passes as DINGDONG_TOKEN.
#
# Generate the token with: openssl rand -hex 32
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: dingdong-token
  namespace: dingdong
spec:
  itemPath: vaults/Homelab/items/dingdong
