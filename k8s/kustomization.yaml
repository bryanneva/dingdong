apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# This kustomization assumes the `dingdong` namespace already exists.
# Create it once via `kubectl create namespace dingdong` (or in a separate
# bootstrap kustomization) before pointing your GitOps controller at this
# directory.
resources:
  - dingdong-secret.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
# Image tag is rewritten on every push to main by .github/workflows/release.yml.
# Don't hand-edit this block — CI does `kustomize edit set image` and commits
# the result back. See README "Deploy" for the loop.
images:
  - name: ghcr.io/bryanneva/dingdong
    newTag: main-21f0a1d
